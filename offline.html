<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>🍽️ طلبات الأكل — غير متصل</title>
<link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;700;900&display=swap" rel="stylesheet">
<style>
  *{margin:0;padding:0;box-sizing:border-box;}
  body{
    font-family:'Tajawal',sans-serif;
    background:#0c0c0c;color:#efefef;
    min-height:100vh;
    display:flex;align-items:center;justify-content:center;
    text-align:center;padding:20px;
  }
  .wrap{max-width:320px;}
  .icon{font-size:4rem;display:block;margin-bottom:20px;animation:float 3s ease-in-out infinite;}
  @keyframes float{0%,100%{transform:translateY(0)}50%{transform:translateY(-10px)}}
  h1{font-size:1.4rem;font-weight:900;margin-bottom:10px;}
  p{color:#909090;font-size:.9rem;line-height:1.7;margin-bottom:24px;}
  .btn{
    display:inline-block;
    background:linear-gradient(135deg,#F5A623,#e8960f);
    color:#1a0e00;padding:14px 28px;border-radius:12px;
    font-family:'Tajawal',sans-serif;font-weight:800;font-size:1rem;
    cursor:pointer;border:none;text-decoration:none;
    box-shadow:0 4px 18px rgba(245,166,35,.3);
    transition:all .2s;
  }
  .btn:hover{transform:translateY(-2px);}
  .status{
    margin-top:20px;font-size:.78rem;color:#555;
    display:flex;align-items:center;justify-content:center;gap:6px;
  }
  .dot{
    width:8px;height:8px;border-radius:50%;
    background:#E74C3C;
    animation:pulse 1.5s ease-in-out infinite;
  }
  @keyframes pulse{0%,100%{opacity:1}50%{opacity:.4}}
</style>
</head>
<body>
  <div class="wrap">
    <span class="icon">📡</span>
    <h1>مفيش اتصال بالنت</h1>
    <p>
      أنت حالياً غير متصل بالإنترنت.<br>
      لازم تكون متصل عشان تبعت أو تشوف الطلبات.
    </p>
    <button class="btn" onclick="tryReload()">🔄 حاول تاني</button>
    <div class="status">
      <div class="dot" id="dot"></div>
      <span id="status-text">غير متصل</span>
    </div>
  </div>
  <script>
    function tryReload(){
      if(navigator.onLine){
        window.location.href='/';
      } else {
        const btn=document.querySelector('.btn');
        btn.textContent='⏳ جاري المحاولة...';
        setTimeout(()=>btn.textContent='🔄 حاول تاني',1500);
      }
    }
    window.addEventListener('online',()=>{
      document.getElementById('dot').style.background='#2ECC71';
      document.getElementById('status-text').textContent='عاد الاتصال! جاري الفتح...';
      setTimeout(()=>window.location.href='/',1000);
    });
    window.addEventListener('offline',()=>{
      document.getElementById('dot').style.background='#E74C3C';
      document.getElementById('status-text').textContent='غير متصل';
    });
  </script>
</body>
</html>
